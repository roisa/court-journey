name: Deploy web app to GitHub Pages

# Builds the Expo web export and publishes it to GitHub Pages.
# Uses the official Pages artifact flow (no gh-pages branch push) so all
# commits stay on the working branch.

on:
  push:
    branches:
      - claude/court-journey-design-YOU2i
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web

      - name: Add SPA fallback + disable Jekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages for the repo if it isn't already.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
